name: Tests

permissions:
  contents: read

on:
  push:
    branches:
    - master
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
        starlette-version: [ '0.27.0', '0.33.0', '0.37.0', '0.42.0', '0.46.0', '0.52.1', '1.0.0rc1' ]
        os: [ ubuntu-latest ]
        exclude:
          # Only test oldest Starlette with oldest Python and newest Starlette with newest Python
          - python-version: '3.12'
            starlette-version: '0.27.0'
          # Reduce testing combinations for middle versions
          - python-version: '3.10'
            starlette-version: '0.27.0'
          - python-version: '3.10'
            starlette-version: '0.33.0'
          - python-version: '3.11'
            starlette-version: '0.37.0'
          - python-version: '3.11'
            starlette-version: '0.42.0'
    name: Test Python ${{ matrix.python-version }} / Starlette ${{ matrix.starlette-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install "starlette==${{ matrix.starlette-version }}"
      - name: Run tests
        run: scripts/test
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14' && matrix.starlette-version == '1.0.0rc1'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  code-quality:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11' ]
        os: [ ubuntu-latest ]
    name: Code Quality (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group code-quality
      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
